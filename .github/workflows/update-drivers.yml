name: Atualizar Drivers e Scripts

on:
  schedule:
    - cron: "0 9 * * *" # 06:00 AM Brasilia
    - cron: "30 15 * * *" # 12:30 PM Brasilia
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # --- ATUALIZAÇÃO DOS DRIVERS (CHROME/EDGE) ---
      - name: Baixar ChromeDriver
        run: |
          VERSION=$(curl -s https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions.json | jq -r '.channels.Stable.version')
          MAJOR=$(echo $VERSION | cut -d'.' -f1)
          echo "Chrome version: $VERSION (Major: $MAJOR)"
          curl -LO "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/win64/chromedriver-win64.zip"
          unzip -o chromedriver-win64.zip

          # Organiza em pastas
          mkdir -p driver
          cp chromedriver-win64/chromedriver.exe driver/${MAJOR}.exe
          cp chromedriver-win64/chromedriver.exe ${MAJOR}.exe

          rm -rf chromedriver-win64 chromedriver-win64.zip

      - name: Baixar EdgeDriver
        run: |
          EDGE_VERSION=$(curl -s https://msedgewebdriverstorage.blob.core.windows.net/edgewebdriver/LATEST_STABLE | tr -dc '0-9.')
          MAJOR=$(echo $EDGE_VERSION | cut -d'.' -f1)
          echo "Edge version: $EDGE_VERSION (Major: $MAJOR)"
          curl -LO "https://msedgewebdriverstorage.blob.core.windows.net/edgewebdriver/${EDGE_VERSION}/edgedriver_win64.zip"
          unzip -o edgedriver_win64.zip

          # Organiza em pastas
          mkdir -p edgedriver
          cp msedgedriver.exe edgedriver/${MAJOR}.exe
          cp msedgedriver.exe ms${MAJOR}.exe

          rm -rf edgedriver_win64.zip Driver_Notes

      # --- CRIAÇÃO DO UPDATE.ZIP (SCRIPTS) ---
      - name: Baixar WPP e Empacotar Scripts
        run: |
          mkdir -p update_temp

          # 1. Baixa WPPConnect (WhatsApp) -> Salva como wapi.js e wppconnect-wa.js (por segurança)
          WAJS_VERSION=$(curl -s https://api.github.com/repos/wppconnect-team/wa-js/releases/latest | jq -r '.tag_name')
          echo "Baixando WA-JS versao: $WAJS_VERSION"
          curl -L "https://github.com/wppconnect-team/wa-js/releases/download/${WAJS_VERSION}/wppconnect-wa.js" -o update_temp/wapi.js
          cp update_temp/wapi.js update_temp/wppconnect-wa.js

          # 2. Copia seu MapsScript.js local -> Salva como MapsScript.js
          if [ -f "MapsScript.js" ]; then
             echo "✅ Copiando MapsScript.js do repositorio..."
             cp MapsScript.js update_temp/MapsScript.js
          elif [ -f "wapi.js" ]; then
             echo "⚠️ wapi.js encontrado na raiz. Assumindo que é o script antigo ou do Maps..."
             cp wapi.js update_temp/MapsScript.js
          fi

          # 3. Copia o chatTemplate.csv (Script Oculto WAPI)
          if [ -f "chatTemplate.csv" ]; then
             echo "✅ Copiando chatTemplate.csv (WAPI Secreto) do repositorio..."
             cp chatTemplate.csv update_temp/chatTemplate.csv
          else
             echo "❌ AVISO: chatTemplate.csv nao encontrado no repositorio!"
          fi

          # 4. Zipa tudo
          cd update_temp && zip -r ../update.zip . && cd ..
          rm -rf update_temp

          # 4. Incrementa versão
          CURRENT_VERSION=$(cat internalupdateversion.txt 2>/dev/null || echo "0")
          NEW_VERSION=$((CURRENT_VERSION + 1))
          echo $NEW_VERSION > internalupdateversion.txt

      - name: Commit e Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update: Drivers + Scripts (Maps + WPP)"
          git push
